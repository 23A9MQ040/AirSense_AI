# Spring Application Configuration
spring.application.name=AirSense-AI

# Server Port
server.port=8080

# Database Configuration (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:airsense_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Redis Configuration for caching (Disabled for local testing)
# spring.data.redis.host=${REDIS_HOST:localhost}
# spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=simple

# Spring Security Config
spring.main.allow-circular-references=true

# Custom Application settings
# ADK multi-agent python execution parameters
airsense.agents.path=../agents-cli/agents_workflow.py
airsense.jwt.secret=9a8f7b6c5d4e3f2g1h0i9j8k7l6m5n4o3p2q1r0s9t8u7v6w5x4y3z2a1b0c9d8e
airsense.jwt.expirationMs=86400000
