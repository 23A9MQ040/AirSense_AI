# Spring Application Configuration
spring.application.name=AirSense-AI

# Server Port
server.port=${PORT:8080}

# ================================================
# Database Configuration
# Uses PostgreSQL in production (env vars set by Render)
# Falls back to H2 in-memory for local development
# ================================================
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:airsense_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=${H2_CONSOLE:true}

# ================================================
# Cache Configuration
# Uses simple in-memory cache by default (no Redis needed for local dev)
# Set CACHE_TYPE=redis and REDIS_HOST to enable Redis in production
# ================================================
spring.cache.type=${CACHE_TYPE:simple}

# Conditionally configure Redis only when CACHE_TYPE=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ================================================
# CORS Configuration
# ================================================
airsense.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,https://23a9mq040.github.io}

# ================================================
# Spring Security Config
# ================================================
spring.main.allow-circular-references=true

# ================================================
# Custom Application Settings
# ================================================
# ADK multi-agent python execution parameters
airsense.agents.path=${AGENTS_PATH:../agents-cli/agents_workflow.py}
airsense.jwt.secret=${JWT_SECRET:AirSenseAI-SecretKey-2026-ForDevelopment-OnlyChangeInProduction}
airsense.jwt.expirationMs=86400000

# ================================================
# Gemini API Key (injected from env)
# ================================================
GEMINI_API_KEY=${GEMINI_API_KEY:}

# ================================================
# Scheduling
# ================================================
spring.task.scheduling.pool.size=5

# ================================================
# Logging
# ================================================
logging.level.com.airsense=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
