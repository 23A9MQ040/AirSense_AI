version: '3.9'

services:
  # ─── Spring Boot Backend ───────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend-java/Dockerfile
    container_name: airsense-backend
    ports:
      - "8080:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-airsense-local-jwt-secret-key-min32chars}
      - AGENTS_PATH=/agents-cli/agents_workflow.py
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
      - H2_CONSOLE=true
    volumes:
      - ./agents-cli:/agents-cli:ro
      - ./mcp-server:/mcp-server:ro
    networks:
      - airsense-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/public/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── React Frontend (dev mode) ─────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: airsense-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - airsense-network
    restart: unless-stopped

networks:
  airsense-network:
    driver: bridge
