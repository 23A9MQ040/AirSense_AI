version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: airsense-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: airsense_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d airsense_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: airsense-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    container_name: airsense-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=airsense_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AIRSENSE_AGENTS_PATH=/app/agents-cli/agents_workflow.py
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./agents-cli:/app/agents-cli
      - ./mcp-server:/app/mcp-server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: airsense-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
